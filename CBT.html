<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT | ICPaser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #f0f2f5; }
        .page { display: none; }
        .page.active { display: block; }
        .option-container input[type="radio"]:checked + div { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- HEADER -->
    <div id="main-header" class="bg-blue-600 text-white px-4 py-3 hidden shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xs font-bold">CBT Application</h1>
            <button onclick="logout()" class="text-xs"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </div>

    <main class="flex-grow flex items-center justify-center w-full p-4">
        <!-- LOGIN -->
        <div id="page-login" class="page active w-full max-w-sm">
            <div class="bg-white p-6 rounded-xl shadow-lg border">
                <h2 class="text-sm font-bold mb-4">Login Peserta</h2>
                <input type="text" id="login-nama" placeholder="Masukkan nama kamu..." class="w-full p-2 bg-gray-100 border rounded text-xs mb-4">
                <button onclick="handleLogin()" class="w-full bg-blue-500 text-white text-xs py-2 rounded">Login</button>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="page-dashboard" class="page w-full max-w-2xl">
            <div class="bg-white p-4 rounded shadow-sm border mb-4">
                <p id="quote-text" class="text-xs italic text-gray-600"></p>
            </div>
            
            <div id="list-jadwal" class="space-y-3">
                <!-- Ujian akan muncul di sini otomatis -->
            </div>
        </div>

        <!-- SOAL -->
        <div id="page-exam" class="page w-full max-w-2xl">
            <div class="bg-white p-6 rounded shadow border">
                <p id="question-text" class="text-sm font-medium mb-4"></p>
                <div id="options-container" class="space-y-2"></div>
                <div class="mt-6 flex justify-between">
                    <button id="btn-prev" onclick="prevQuestion()" class="text-xs text-gray-500">Sebelumnya</button>
                    <button id="btn-next" onclick="nextQuestion()" class="bg-blue-500 text-white px-4 py-2 rounded text-xs">Selanjutnya</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // DATA JADWAL UJIAN (Tambah di sini kalau mau nambah ujian lagi)
        const daftarJadwal = [
            { id: 1, nama: "Final Review 16", deskripsi: "Ujian Akhir 16", aktif: true },
            { id: 2, nama: "Special Surprise", deskripsi: "Ujian Kejutan Khusus", aktif: false },
            { id: 3, nama: "Memory Lane", deskripsi: "Ujian Kenangan", aktif: false }
        ];

        const daftarSoal = [
            { text: "Bagaimana perjalananmu di usia 16 sejauh ini?", options: ["A. Penuh cerita baru", "B. Banyak pelajaran", "C. Ada tawa & tantangan", "D. Semua benar"] }
        ];

        let currentIdx = 0;
        let jawabanUser = [];

        function renderJadwal() {
            const container = document.getElementById('list-jadwal');
            container.innerHTML = daftarJadwal.map(ujian => `
                <div class="border p-4 rounded-lg flex justify-between items-center ${ujian.aktif ? 'bg-white' : 'bg-gray-100 opacity-60'}">
                    <div>
                        <h4 class="text-xs font-bold">${ujian.nama}</h4>
                        <p class="text-[10px] text-gray-400">${ujian.deskripsi}</p>
                    </div>
                    <button ${ujian.aktif ? '' : 'disabled'} onclick="startExam(${ujian.id})" class="${ujian.aktif ? 'bg-blue-500' : 'bg-gray-400'} text-white text-xs px-4 py-2 rounded">
                        ${ujian.aktif ? 'Kerjakan' : 'Locked'}
                    </button>
                </div>
            `).join('');
        }

        function handleLogin() {
            const nama = document.getElementById('login-nama').value;
            if(!nama) return alert("Isi nama dulu!");
            document.getElementById('quote-text').innerText = "Semangat hari ini, " + nama + "!";
            renderJadwal();
            navigateTo('page-dashboard');
        }

        function navigateTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('main-header').classList.toggle('hidden', id === 'page-login');
        }

        function startExam(id) {
            console.log("Mulai ujian ID:", id);
            renderSoal();
            navigateTo('page-exam');
        }

        function renderSoal() {
            const soal = daftarSoal[currentIdx];
            document.getElementById('question-text').innerText = soal.text;
            const cont = document.getElementById('options-container');
            cont.innerHTML = soal.options.map(opt => `
                <label class="block p-3 border rounded cursor-pointer hover:bg-gray-50">
                    <input type="radio" name="jwb" value="${opt}"> ${opt}
                </label>
            `).join('');
        }

        function nextQuestion() {
            if(currentIdx < daftarSoal.length - 1) {
                currentIdx++; renderSoal();
            } else {
                confetti();
                alert("Selesai!");
                navigateTo('page-dashboard');
            }
        }

        function prevQuestion() {
            if(currentIdx > 0) { currentIdx--; renderSoal(); }
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
